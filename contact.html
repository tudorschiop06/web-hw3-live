    <main id="main-content">
        
        <section>
            <h2>Lasa-mi un mesaj</h2>
            <p>Pentru orice intrebare completeaza formularul de mai jos.</p>

            <form action="#" method="get">
                <fieldset>
                    <legend>Date de contact si mesaj</legend>

                    <div>
                        <label for="nume">Nume:</label>
                        <input type="text" id="nume" name="nume" required>
                    </div>  

                    <div>
                        <label for="email">Adresa de email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div>
                        <label for="subiect">Subiectul mesajului:</label>
                        <select id="subiect" name="subiect">
                            <option value="altele">Altele</option>
                            <option value="proiect">Proiect nou</option>
                            <option value="angajare">Oportunitate de job</option>
                        </select>
                    </div>

                    <div>
                        <label for="mesaj">Mesajul tau:</label>
                        <textarea id="mesaj" name="mesaj" rows="5" required></textarea>
                    </div>

                    <div>
                        <button type="submit">Trimite mesajul</button>
                    </div>

                </fieldset>
            </form>
        </section>

    </main>

    <footer>

</body>
