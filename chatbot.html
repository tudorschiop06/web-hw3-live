    <main id="main-content">
        <div id="chat-container">
            <h1>Asistent virtual</h1>
            <p>Sunt un bot simplu. Foloseste butoanele sau scrie un mesaj.</p>
            
            <div id="chat-box">
                <p class="bot-msg">Salut! Cu ce te pot ajuta azi?</p>
            </div>

            <div class="suggestions">
                <button onclick="puneText('Salut')">Salut</button>
                <button onclick="puneText('Facultate')">Facultate</button>
                <button onclick="puneText('Proiecte')">Proiecte</button>
                <button onclick="puneText('Cine esti?')">Cine esti?</button>
            </div>

            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Scrie ceva...">
                <button onclick="trimiteMesaj()">Trimite</button>
            </div>
        </div>
    </main>

    <script src="chatbot.js"></script>
</body>
